name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to use APP_VERSION)'
        type: string
        default: ''
      platform:
        description: which platform to build
        type: choice
        options:
        - all
        - mingw64
        - macos
        - nx
        - psvita
        - ps4
        - flatpak
        - android
        - aur
        - deb
      pre_release:
        description: 'Upload artifacts to a GitHub pre-release'
        type: boolean
        default: false
      disable_builtin_nsp:
        description: disable builtin NSP
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_number: ${{ steps.resolve.outputs.version_number }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build version
        id: resolve
        run: |
          # Read base version from VERSION file
          APP_VERSION="$(cat VERSION | tr -d '\n')"
          BASE="${APP_VERSION#v}"
          BASE_NUM=$(echo "$BASE" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          if [[ -z "$BASE_NUM" ]]; then
            BASE_NUM="0.0.0"
          fi

          if [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${APP_VERSION}"
          else
            # Non-release: use base version + build number (e.g. 2.1.0.456)
            V="${BASE}.${{ github.run_number }}"
          fi
          V="${V#v}"
          # Extract numeric version for CMake / Vita / PS4 / deb (no labels)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Release: X.Y.Z only
            NUM="${BASE_NUM}"
          else
            # Non-release: X.Y.Z.build
            NUM="${BASE_NUM}.${{ github.run_number }}"
          fi
          # Filename/tag-safe version (spaces → hyphens)
          TAG="${V// /-}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "version_number=${NUM}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Display version: ${V}"
          echo "Numeric version: ${NUM}"
          echo "Tag/filename version: ${TAG}"

  # ───────────────────────────────────────────────
  # Save version override to VERSION file
  # ───────────────────────────────────────────────
  save-version:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Update VERSION file
        run: |
          echo "${{ inputs.version }}" > VERSION
          echo "Updated VERSION to: ${{ inputs.version }}"
          cat VERSION
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update APP_VERSION to ${{ inputs.version }}"
          git push

  upload-release:
    needs: [ resolve-version, build-mingw, build-nx, build-macos, build-flatpak, build-aur, build-ps4, build-vita, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Assets
        uses: actions/download-artifact@v4
      - name: Package Windows assets
        run: |
          for p in VitaPlex-windows-*; do
            [[ -d $p ]] && 7z a -mx=9 $p.7z ./$p/* && rm -rf $p
          done
      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: VitaPlex ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            VitaPlex-windows-*.7z
            VitaPlex-macos-*/*
            VitaPlex-nx-*/*.nro
            VitaPlex-ps4-*/*
            VitaPlex-vita-*/*.vpk
            VitaPlex-Flatpak-*/*
            VitaPlex-aur-*/*.pkg.tar.*
            VitaPlex-android-*/*

  # ───────────────────────────────────────────────
  # Pre-release — manually triggered
  # ───────────────────────────────────────────────
  upload-prerelease:
    needs: [resolve-version, build-mingw, build-nx, build-macos, build-flatpak, build-aur, build-ps4, build-vita, build-android, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !cancelled() && !failure() && github.event_name == 'workflow_dispatch' && inputs.pre_release == true }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Rename artifacts for release
        env:
          FVER: ${{ needs.resolve-version.outputs.version_tag }}
        run: |
          mkdir -p release

          # Vita VPK
          for f in $(find . -name "*.vpk"); do
            cp "$f" "release/VitaPlex.${FVER}.vpk"
          done

          # Android APKs (Gradle names them VitaPlex-{abi}.apk)
          for apk in $(find . -name "*.apk"); do
            abi=$(basename "$apk" .apk | sed 's/VitaPlex-//')
            [ -n "$abi" ] && cp "$apk" "release/VitaPlex.${FVER}-${abi}.apk"
          done

          # Windows — zip each arch (exe + dlls + resources)
          for dir in VitaPlex-mingw-*; do
            [ -d "$dir" ] || continue
            arch=$(echo "$dir" | sed -E 's/VitaPlex-mingw-([^-]+)-.*/\1/')
            (cd "$dir" && zip -r "../release/VitaPlex.${FVER}-windows-${arch}.zip" .)
          done

          # Flatpak tarballs
          for tgz in $(find . -name "VitaPlex-Linux-*.tar.gz"); do
            base=$(basename "$tgz")
            info=$(echo "$base" | sed -E 's/VitaPlex-Linux-(.+)-[0-9]+\.tar\.gz/\1/')
            cp "$tgz" "release/VitaPlex.${FVER}-Flatpak-${info}.tar.gz"
          done

          # Switch NRO
          for dir in VitaPlex-nx-*; do
            [ -d "$dir" ] || continue
            driver=$(echo "$dir" | sed -E 's/VitaPlex-nx-([^-]+)-.*/\1/')
            nro=$(find "$dir" -name "*.nro" | head -1)
            [ -n "$nro" ] && cp "$nro" "release/VitaPlex.${FVER}-nx-${driver}.nro"
          done

          # PS4 pkg
          for f in $(find . -path "*ps4*" -name "*.pkg"); do
            cp "$f" "release/VitaPlex.${FVER}-ps4.pkg"
          done

          # macOS DMG
          for dir in VitaPlex-macos-*; do
            [ -d "$dir" ] || continue
            tag=$(echo "$dir" | sed -E 's/VitaPlex-macos-([^-]+)-.*/\1/')
            dmg=$(find "$dir" -name "*.dmg" | head -1)
            [ -n "$dmg" ] && cp "$dmg" "release/VitaPlex.${FVER}-macOS-${tag}.dmg"
          done

          # Deb
          for f in $(find . -name "*.deb"); do
            arch=$(dpkg-deb -f "$f" Architecture 2>/dev/null || echo "amd64")
            cp "$f" "release/VitaPlex.${FVER}-Linux_${arch}.deb"
          done

          # AUR
          for f in $(find . -name "*.pkg.tar.zst"); do
            cp "$f" "release/VitaPlex.${FVER}-Linux.pkg.tar.zst"
          done

          echo "Release files:"
          ls -lh release/
      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          name: VitaPlex ${{ needs.resolve-version.outputs.version }}
          tag_name: ${{ needs.resolve-version.outputs.version_tag }}
          prerelease: true
          generate_release_notes: true
          files: release/*

  # ───────────────────────────────────────────────
  # PS Vita — VPK
  # ───────────────────────────────────────────────
  build-vita:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'psvita' || inputs.platform == 'all' ||  github.event_name != 'workflow_dispatch' }}
    name: PS Vita
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install build requirements
        run: apk update && apk add cmake ninja git zstd tar pkgconf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vita dependencies
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/vita-packages
        run: |
          for pkg in mbedtls-3.6.5-1 curl-8.16.0-2 ffmpeg-n6.0-3 mpv-0.36.0-3; do
            wget "$BASE_URL/${pkg}-arm.tar.xz"
          done
          vdpm libass harfbuzz fribidi freetype libpng libwebp $PWD/*-arm.tar.xz
          git config --system --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_PSV=ON \
          -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-vita-${{ github.run_number }}
          path: build/VitaPlex.vpk
      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-elf-${{ github.run_number }}
          path: build/VitaSuwayomi.velf

             
  # ───────────────────────────────────────────────
  # Android — switchfin-style APK build
  # ───────────────────────────────────────────────
  build-android:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27d
        link-to-sdk: true
    - name: Install dependency
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build pkg-config meson nasm make zstd
    - name: Cache depends
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: jniLibs
        key: jniLibs-${{ hashFiles('scripts/android/Makefile') }}
    - name: Build packages
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        make -C scripts/android TMPDIR=${{ runner.temp }} download
        make -C scripts/android TMPDIR=${{ runner.temp }} ABI=armeabi-v7a \
          ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }} build
        make -C scripts/android TMPDIR=${{ runner.temp }} ABI=arm64-v8a \
          ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }} build
    - name: Bump version
      uses: chkfung/android-version-actions@v1.2.2
      with:
        gradlePath: app/platform/android/app/build.gradle
        versionCode: ${{ github.run_number }}
        versionName: ${{ needs.resolve-version.outputs.version }}
    - name: Prepare Android sources and native dependencies
      run: |
        rm -rf app/platform/android/app/libs
        mkdir -p app/platform/android/app/libs
        for abi in armeabi-v7a arm64-v8a x86_64; do
          src_libdir="jniLibs/${abi}/lib"
          [ -d "${src_libdir}" ] || continue

          # Normalize optional linker names for CMake (-lpng/-lbz2/-lzstd).
          for missing in png bz2 zstd; do
            [ -e "${src_libdir}/lib${missing}.so" ] && continue
            [ -e "${src_libdir}/lib${missing}.a" ] && continue
            candidate="$(find "${src_libdir}" -maxdepth 1 -type f \( -name "lib${missing}*.so*" -o -name "lib${missing}*.a" \) | head -n1)"
            [ -n "${candidate}" ] || continue
            ln -sfn "$(basename "${candidate}")" "${src_libdir}/lib${missing}.so"
            echo "Aliased ${src_libdir}/lib${missing}.so -> $(basename "${candidate}")"
          done

          # Only stage runtime .so files for packaging to keep Gradle memory low.
          dst_libdir="app/platform/android/app/libs/${abi}"
          mkdir -p "${dst_libdir}"
          find "${src_libdir}" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -a {} "${dst_libdir}/" \;
        done
    - name: Build APK
      # build_libromfs_generator.sh must run before Gradle/CMake configure because
      # borealis's toolchain.cmake unconditionally checks that the generator binary
      # exists when PLATFORM_ANDROID is set — even though USE_LIBROMFS=OFF means
      # the generator is never actually used to embed anything.
      # Resources are loaded via APK assets (see build.gradle syncBorealisResources).
      run: |
        ${{ github.workspace }}/lib/borealis/build_libromfs_generator.sh
        cd app/platform/android && ./gradlew assembleRelease
    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: VitaPlex-android-${{ github.run_number }}
        path: app/platform/android/app/build/outputs/apk/release/*.apk

  # ───────────────────────────────────────────────
  # Flatpak — Linux Matrix (x86_64 + aarch64, OpenGL)
  # ───────────────────────────────────────────────
  build-flatpak:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'flatpak' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Flatpak (${{ matrix.arch }}-${{ matrix.driver }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x86_64, runner: ubuntu-24.04, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gles2, gles2: "ON" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set workspace permissions
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Install dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              cmake ninja-build pkg-config \
              libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
              libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
              libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
              libpng-dev libwebp-dev libzstd-dev libdbus-1-dev \
              libwayland-dev libxkbcommon-dev xorg-dev
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache \
              cmake ninja pkgconf \
              curl-dev mbedtls-dev mpv-dev ffmpeg-dev lame-dev libass-dev freetype-dev harfbuzz-dev fribidi-dev \
              libpng-dev libwebp-dev zstd-dev dbus-dev wayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev
          else
            echo "No supported package manager found; assuming container image already has required build dependencies"
          fi
      - name: Build desktop target in flatpak container
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_GLES2=${{ matrix.gles2 }} \
             -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
          tar -czf VitaPlex-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz -C build VitaPlex resources
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-Flatpak-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}
          path: VitaPlex-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz

  # ───────────────────────────────────────────────
  # Nintendo Switch — Matrix (opengl + deko3d)
  # ───────────────────────────────────────────────
  build-nx:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'nx' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: NX (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - { driver: opengl, mpv_pkg: switch-libmpv-0.41.0-5-any.pkg.tar.zst, cmake_extra: "" }
        - { driver: deko3d, mpv_pkg: switch-libmpv-deko3d-0.41.0-5-any.pkg.tar.zst, cmake_extra: "-DUSE_DEKO3D=ON" }
    container:
      image: devkitpro/devkita64:20260219
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install switchfin portlibs
        run: |
          BASE_URL="https://github.com/dragonflylee/switchfin/releases/download/switch-portlibs"
          dkp-pacman --noconfirm -Rdd switch-libmpv || true
          dkp-pacman --noconfirm -Rdd switch-libmpv-deko3d || true
          dkp-pacman --noconfirm -U \
            $BASE_URL/hacBrewPack-3.05-1-x86_64.pkg.tar.zst \
            $BASE_URL/libuam-master-1-any.pkg.tar.zst \
            $BASE_URL/switch-dav1d-1.5.3-1-any.pkg.tar.zst \
            $BASE_URL/${{ matrix.mpv_pkg }}
      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DPLATFORM_SWITCH=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            ${{ matrix.cmake_extra }}
          cmake --build build
      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-switch-${{ matrix.driver }}-${{ github.run_number }}
          path: build/VitaPlex.nro

  # ───────────────────────────────────────────────
  # PS4
  # ───────────────────────────────────────────────
  build-ps4:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'ps4' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: PS4
    runs-on: ubuntu-latest
    container:
      image: xfangfang/pacbrew:250221
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install PS4 portlibs
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/pacbrew
        run: |
          for pkg in musl-1.5-3 mbedtls-2.28.10-2 sdl2-2.0.18-19 libcurl-7.80.0-5; do
            pacman --noconfirm -U "$BASE_URL/ps4-openorbis-${pkg}-any.pkg.tar.gz"
          done
      - name: Build
        env:
          OPENORBIS: /opt/pacbrew/ps4/openorbis
        run: |
          cmake -B build -DPLATFORM_PS4=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
      - name: Upload PS4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-ps4-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/**/*.pkg
            build/**/*.oelf

  # ───────────────────────────────────────────────
  # macOS matrix (explicit job name parity)
  # ───────────────────────────────────────────────
  build-macos:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: macOS (${{ matrix.tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { tag: Silicon, arch: arm64, target: "11.0", runner: macos-14 }
        - { tag: Intel, arch: x86_64, target: "11.0", runner: macos-15-intel }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: brew install cmake ninja pkg-config curl mbedtls mpv libass freetype harfbuzz fribidi libpng webp zstd glfw
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.target }} \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
      - name: Bundle macOS dylibs
        run: |
          BIN="build/VitaPlex"
          if [ ! -f "$BIN" ]; then
            echo "Expected binary not found: $BIN"
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          queue_file="$tmpdir/queue.txt"
          scanned_file="$tmpdir/scanned.txt"
          bundled_file="$tmpdir/bundled.txt"
          printf '%s\n' "$BIN" > "$queue_file"
          : > "$scanned_file"
          : > "$bundled_file"

          while [ -s "$queue_file" ]; do
            current="$(head -n 1 "$queue_file")"
            tail -n +2 "$queue_file" > "$queue_file.next" || true
            mv "$queue_file.next" "$queue_file"
            printf '%s\n' "$current" >> "$scanned_file"

            while IFS= read -r dep; do
              resolved_dep="$dep"
              case "$dep" in
                /usr/lib/*|/System/*|@executable_path/*|@loader_path/*)
                  continue
                  ;;
                @rpath/*)
                  base_from_rpath="${dep#@rpath/}"
                  resolved_dep=""
                  for probe in \
                    "/usr/local/lib/$base_from_rpath" \
                    "/opt/homebrew/lib/$base_from_rpath" \
                    /usr/local/opt/*/lib/"$base_from_rpath" \
                    /opt/homebrew/opt/*/lib/"$base_from_rpath"; do
                    if [ -f "$probe" ]; then
                      resolved_dep="$probe"
                      break
                    fi
                  done
                  if [ -z "$resolved_dep" ]; then
                    echo "Skipping unresolved @rpath dependency: $dep"
                    continue
                  fi
                  ;;
              esac

              if [ ! -f "$resolved_dep" ]; then
                echo "Skipping missing dependency reference: $dep"
                continue
              fi

              base="$(basename "$resolved_dep")"
              target="build/$base"

              if ! grep -Fxq "$base" "$bundled_file"; then
                cp -f "$resolved_dep" "$target"
                install_name_tool -id "@executable_path/$base" "$target"
                install_name_tool -add_rpath "@executable_path" "$target" 2>/dev/null || true
                printf '%s\n' "$base" >> "$bundled_file"
                echo "Bundled $base (from $(basename "$current"))"
              fi

              install_name_tool -change "$dep" "@executable_path/$base" "$current"

              if ! grep -Fxq "$target" "$scanned_file" && ! grep -Fxq "$target" "$queue_file"; then
                printf '%s\n' "$target" >> "$queue_file"
              fi
            done < <(otool -L "$current" | tail -n +2 | awk '{print $1}')
          done

          install_name_tool -add_rpath "@executable_path" "$BIN" 2>/dev/null || true

          rm -rf "$tmpdir"
      - name: Package macOS DMG
        run: |
          APP_ROOT="build/dmg-root"
          APP_DIR="$APP_ROOT/VitaPlex.app"
          MACOS_DIR="$APP_DIR/Contents/MacOS"

          rm -rf "$APP_ROOT"
          mkdir -p "$MACOS_DIR"

          cp -f build/VitaPlex "$MACOS_DIR/VitaPlex"
          cp -R build/resources "$MACOS_DIR/resources"
          cp -f build/*.dylib "$MACOS_DIR/" 2>/dev/null || true
          chmod +x "$MACOS_DIR/VitaPlex"

          cat > "$APP_DIR/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>VitaPlex</string>
            <key>CFBundleDisplayName</key><string>VitaPlex</string>
            <key>CFBundleIdentifier</key><string>com.VitaPlex.app</string>
            <key>CFBundleVersion</key><string>${{ needs.resolve-version.outputs.version_number }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.resolve-version.outputs.version }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>VitaPlex</string>
          </dict>
          </plist>
          PLIST

          hdiutil create \
            -volname "VitaPlex" \
            -srcfolder "$APP_ROOT" \
            -ov \
            -format UDZO \
            "build/VitaPlex-${{ matrix.tag }}.dmg"
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-macos-${{ matrix.tag }}-${{ github.run_number }}
          path: |
            build/VitaPlex
            build/VitaPlex-*.dmg
            build/*.dylib
            build/resources/

  # ───────────────────────────────────────────────
  # MinGW matrix (x64/x86/arm64)
  # ───────────────────────────────────────────────
  build-mingw:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'mingw64' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: MinGW (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x64, sys: mingw64, env: x86_64, runner: windows-latest }
        - { arch: x86, sys: mingw32, env: i686, runner: windows-latest }
        - { arch: arm64, sys: clangarm64, env: clang-aarch64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          path-type: inherit
          cache: false
          release: ${{ contains(matrix.sys, 'arm64') }}
          install: >-
            mingw-w64-${{ matrix.env }}-ninja
            mingw-w64-${{ matrix.env }}-cc
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-glfw
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependency
        run: |
          for pkg in glfw-3.5.0-1 curl-8.16.0-1 mpv-0.41.0-1 libwebp-1.6.0-1; do
            curl -sLO https://github.com/dragonflylee/switchfin/releases/download/mingw-packages/${MINGW_PACKAGE_PREFIX}-${pkg}-any.pkg.tar.zst
          done
          pacman -U --noconfirm *.pkg.tar.zst
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_SYSTEM_GLFW=ON -DUSE_D3D11=ON \
          -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
      - name: Bundle runtime DLLs
        run: |
          EXE="build/VitaPlex.exe"
          DLL_DIR="${MINGW_PREFIX}/bin"
          if [ ! -f "$EXE" ]; then
            echo "Expected binary not found: $EXE"
            exit 1
          fi
          if [ ! -d "$DLL_DIR" ]; then
            echo "Expected DLL directory not found: $DLL_DIR"
            exit 1
          fi

          queue=("$EXE")
          declare -A scanned
          declare -A bundled
          while [ ${#queue[@]} -gt 0 ]; do
            current="${queue[0]}"
            queue=("${queue[@]:1}")
            scanned["$current"]=1

            mapfile -t dlls < <(objdump -p "$current" | awk '/DLL Name:/{print $3}' | sort -u)
            for dll in "${dlls[@]}"; do
              candidate="$DLL_DIR/$dll"
              target="build/$dll"
              if [ -f "$candidate" ]; then
                if [ -z "${bundled[$dll]+x}" ]; then
                  cp -f "$candidate" "$target"
                  bundled["$dll"]=1
                  echo "Bundled $dll (from $(basename "$current"))"
                fi
                if [ -z "${scanned[$target]+x}" ]; then
                  queue+=("$target")
                fi
              fi
            done
          done

          echo "DLLs bundled into build/:"
          ls -1 build/*.dll
      - name: Upload mingw artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-mingw-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            build/VitaPlex.exe
            build/*.dll
            build/resources/

  # ───────────────────────────────────────────────
  # Debian package-like build
  # ───────────────────────────────────────────────
  build-deb:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'deb' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Deb build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/usr/bin" "$PKGROOT/usr/lib/VitaPlex" "$PKGROOT/usr/share/VitaPlex" "$PKGROOT/usr/share/applications" "$PKGROOT/usr/share/pixmaps"
          install -m 755 build/VitaPlex "$PKGROOT/usr/lib/VitaPlex/VitaPlex"
          {
            echo '#!/usr/bin/env sh'
            echo 'cd /usr/share/VitaPlex || exit 1'
            echo 'exec /usr/lib/VitaPlex/VitaPlex "$@"'
          } > "$PKGROOT/usr/bin/VitaPlex"
          chmod 755 "$PKGROOT/usr/bin/VitaPlex"
          cp -r build/resources "$PKGROOT/usr/share/VitaPlex/resources"
          install -m 644 app/platform/icon_desktop.png "$PKGROOT/usr/share/pixmaps/VitaPlex.png"
          {
            echo '[Desktop Entry]'
            echo 'Type=Application'
            echo 'Name=VitaPlex'
            echo 'Comment=Plex desktop client'
            echo 'Exec=VitaPlex'
            echo 'Icon=VitaPlex'
            echo 'Terminal=false'
            echo 'Categories=Network;Utility;'
          } > "$PKGROOT/usr/share/applications/VitaPlex.desktop"
          ARCH="$(dpkg --print-architecture)"
          {
            echo "Package: VitaPlex"
            echo "Version: ${{ needs.resolve-version.outputs.version_number }}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: ${ARCH}"
            echo "Maintainer: VitaPlex CI <ci@VitaPlex.local>"
            echo "Description: VitaPlex desktop build artifact"
          } > "$PKGROOT/DEBIAN/control"
          dpkg-deb --build "$PKGROOT" "VitaPlex-${{ github.run_number }}_${ARCH}.deb"
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-deb-${{ github.run_number }}
          path: VitaPlex-${{ github.run_number }}_*.deb

  # ───────────────────────────────────────────────
  # AUR-like build
  # ───────────────────────────────────────────────
  build-aur:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'aur' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: AUR build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }}
          cmake --build build
          tar --zstd -cf VitaPlex-${{ github.run_number }}.pkg.tar.zst -C build VitaPlex resources
      - name: Upload aur artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-aur-${{ github.run_number }}
          path: VitaPlex-${{ github.run_number }}.pkg.tar.zst
