name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (leave empty to use APP_VERSION)'
        type: string
        default: ''
      platform:
        description: which platform to build
        type: choice
        options:
        - all
        - mingw64
        - macos
        - nx
        - psvita
        - ps4
        - flatpak
        - android
        - aur
        - deb
      pre_release:
        description: 'Upload artifacts to a GitHub pre-release'
        type: boolean
        default: false
      disable_builtin_nsp:
        description: disable builtin NSP
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# Build matrix
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_number: ${{ steps.resolve.outputs.version_number }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build version
        id: resolve
        run: |
          # Read base version from VERSION file
          APP_VERSION="$(cat VERSION | tr -d '\n')"
          BASE="${APP_VERSION#v}"
          BASE_NUM=$(echo "$BASE" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
          if [[ -z "$BASE_NUM" ]]; then
            BASE_NUM="0.0.0"
          fi

          if [[ -n "${{ inputs.version }}" ]]; then
            V="${{ inputs.version }}"
            # Also re-derive BASE_NUM from the override. Otherwise the
            # numeric build (NUM = ${BASE_NUM}.${run_number}, used by
            # CMake / Vita / PS4 / deb) keeps reading the previous
            # VERSION-file value while the display version jumps ahead
            # — producing a mismatch like "Display: Beta 1.0.2" but
            # "Numeric: 1.0.1.450". The VERSION file isn't updated
            # until the save-version job runs AFTER resolve-version,
            # so we can't lean on it here.
            OVERRIDE_NUM=$(echo "${V#v}" | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
            if [[ -n "$OVERRIDE_NUM" ]]; then
              BASE_NUM="$OVERRIDE_NUM"
            fi
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${APP_VERSION}"
          else
            # Non-release: use base version + build number (e.g. 2.1.0.456)
            V="${BASE}.${{ github.run_number }}"
          fi
          V="${V#v}"
          # Extract numeric version for CMake / Vita / PS4 / deb (no labels).
          #
          # Drop the github.run_number suffix on any "intentional" build —
          # artifact filenames and embedded SFOs then read "1.0.2"
          # instead of "1.0.2.450". An intentional build is either:
          #   - a tag push (refs/tags/v…) — git-tagged release
          #   - any workflow_dispatch with a version override — the user
          #     typed a number into the form, which is by definition a
          #     release or pre-release. pre_release=true vs false just
          #     decides where the artifact is published; both want a
          #     clean numeric version.
          # Plain pushes to a branch keep the suffix so consecutive CI
          # builds remain distinguishable from one another.
          IS_RELEASE=false
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            IS_RELEASE=true
          elif [[ -n "${{ inputs.version }}" ]]; then
            IS_RELEASE=true
          fi
          if [[ "$IS_RELEASE" == "true" ]]; then
            NUM="${BASE_NUM}"
          else
            NUM="${BASE_NUM}.${{ github.run_number }}"
          fi
          # Filename/tag-safe version (spaces → hyphens)
          TAG="${V// /-}"
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "version_number=${NUM}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Display version: ${V}"
          echo "Numeric version: ${NUM}"
          echo "Tag/filename version: ${TAG}"

  # ───────────────────────────────────────────────
  # Save version override to VERSION file
  # ───────────────────────────────────────────────
  save-version:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Update VERSION file
        run: |
          echo "${{ inputs.version }}" > VERSION
          echo "Updated VERSION to: ${{ inputs.version }}"
          cat VERSION
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update APP_VERSION to ${{ inputs.version }}"
          git push

  upload-release:
    needs: [ resolve-version, build-mingw, build-nx, build-macos, build-flatpak, build-aur, build-ps4, build-vita, build-android ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Assets
        uses: actions/download-artifact@v4
      - name: Package Windows assets
        run: |
          for p in VitaPlex-windows-*; do
            [[ -d $p ]] && 7z a -mx=9 $p.7z ./$p/* && rm -rf $p
          done
      - name: Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: VitaPlex ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            VitaPlex-windows-*.7z
            VitaPlex-macos-*/*
            VitaPlex-nx-*/*.nro
            VitaPlex-ps4-*/*
            VitaPlex-vita-*/*.vpk
            VitaPlex-Flatpak-*/*
            VitaPlex-aur-*/*.pkg.tar.*
            VitaPlex-android-*/*

  # ───────────────────────────────────────────────
  # Pre-release — manually triggered
  # ───────────────────────────────────────────────
  upload-prerelease:
    needs: [resolve-version, build-mingw, build-nx, build-macos, build-flatpak, build-aur, build-ps4, build-vita, build-android, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ !cancelled() && !failure() && github.event_name == 'workflow_dispatch' && inputs.pre_release == true }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Rename artifacts for release
        env:
          FVER: ${{ needs.resolve-version.outputs.version_tag }}
        run: |
          mkdir -p release

          # Vita VPK
          for f in $(find . -name "*.vpk"); do
            cp "$f" "release/VitaPlex.${FVER}.vpk"
          done

          # Android APKs (Gradle names them VitaPlex-{abi}.apk)
          for apk in $(find . -name "*.apk"); do
            abi=$(basename "$apk" .apk | sed 's/VitaPlex-//')
            [ -n "$abi" ] && cp "$apk" "release/VitaPlex.${FVER}-${abi}.apk"
          done

          # Windows — zip each arch (exe + dlls + resources)
          for dir in VitaPlex-mingw-*; do
            [ -d "$dir" ] || continue
            arch=$(echo "$dir" | sed -E 's/VitaPlex-mingw-([^-]+)-.*/\1/')
            (cd "$dir" && zip -r "../release/VitaPlex.${FVER}-windows-${arch}.zip" .)
          done

          # Flatpak tarballs
          for tgz in $(find . -name "VitaPlex-Linux-*.tar.gz"); do
            base=$(basename "$tgz")
            info=$(echo "$base" | sed -E 's/VitaPlex-Linux-(.+)-[0-9]+\.tar\.gz/\1/')
            cp "$tgz" "release/VitaPlex.${FVER}-Flatpak-${info}.tar.gz"
          done

          # Switch NRO
          for dir in VitaPlex-nx-*; do
            [ -d "$dir" ] || continue
            driver=$(echo "$dir" | sed -E 's/VitaPlex-nx-([^-]+)-.*/\1/')
            nro=$(find "$dir" -name "*.nro" | head -1)
            [ -n "$nro" ] && cp "$nro" "release/VitaPlex.${FVER}-nx-${driver}.nro"
          done

          # PS4 pkg
          for f in $(find . -path "*ps4*" -name "*.pkg"); do
            cp "$f" "release/VitaPlex.${FVER}-ps4.pkg"
          done

          # macOS DMG
          for dir in VitaPlex-macos-*; do
            [ -d "$dir" ] || continue
            tag=$(echo "$dir" | sed -E 's/VitaPlex-macos-([^-]+)-.*/\1/')
            dmg=$(find "$dir" -name "*.dmg" | head -1)
            [ -n "$dmg" ] && cp "$dmg" "release/VitaPlex.${FVER}-macOS-${tag}.dmg"
          done

          # Deb
          for f in $(find . -name "*.deb"); do
            arch=$(dpkg-deb -f "$f" Architecture 2>/dev/null || echo "amd64")
            cp "$f" "release/VitaPlex.${FVER}-Linux_${arch}.deb"
          done

          # AUR
          for f in $(find . -name "*.pkg.tar.zst"); do
            cp "$f" "release/VitaPlex.${FVER}-Linux.pkg.tar.zst"
          done

          echo "Release files:"
          ls -lh release/
      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          name: VitaPlex ${{ needs.resolve-version.outputs.version }}
          tag_name: ${{ needs.resolve-version.outputs.version_tag }}
          prerelease: true
          generate_release_notes: true
          files: release/*

  # ───────────────────────────────────────────────
  # PS Vita — VPK
  # ───────────────────────────────────────────────
  build-vita:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'psvita' || inputs.platform == 'all' ||  github.event_name != 'workflow_dispatch' }}
    name: PS Vita
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install build requirements
        run: apk update && apk add cmake ninja git zstd tar pkgconf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vita dependencies
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/vita-packages
        run: |
          for pkg in mbedtls-3.6.5-1 curl-8.16.0-2 ffmpeg-n6.0-3 mpv-0.36.0-3; do
            wget "$BASE_URL/${pkg}-arm.tar.xz"
          done
          vdpm libass harfbuzz fribidi freetype libpng libwebp $PWD/*-arm.tar.xz
          git config --system --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_PSV=ON \
          -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
          -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-vita-${{ github.run_number }}
          path: build/VitaPlex.vpk
      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-elf-${{ github.run_number }}
          path: build/VitaSuwayomi.velf

             
  # ───────────────────────────────────────────────
  # Android — switchfin-style APK build
  # ───────────────────────────────────────────────
  build-android:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27d
        link-to-sdk: true
    - name: Install dependency
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build pkg-config meson nasm make zstd
    - name: Cache depends
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: jniLibs
        key: jniLibs-${{ hashFiles('scripts/android/Makefile') }}
    - name: Build packages
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        make -C scripts/android TMPDIR=${{ runner.temp }} download
        make -C scripts/android TMPDIR=${{ runner.temp }} ABI=armeabi-v7a \
          ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }} build
        make -C scripts/android TMPDIR=${{ runner.temp }} ABI=arm64-v8a \
          ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }} build
    - name: Bump version
      uses: chkfung/android-version-actions@v1.2.2
      with:
        gradlePath: app/platform/android/app/build.gradle
        versionCode: ${{ github.run_number }}
        versionName: ${{ needs.resolve-version.outputs.version }}
    - name: Prepare Android sources and native dependencies
      run: |
        rm -rf app/platform/android/app/libs
        mkdir -p app/platform/android/app/libs
        for abi in armeabi-v7a arm64-v8a x86_64; do
          src_libdir="jniLibs/${abi}/lib"
          [ -d "${src_libdir}" ] || continue

          # Normalize optional linker names for CMake (-lpng/-lbz2/-lzstd).
          for missing in png bz2 zstd; do
            [ -e "${src_libdir}/lib${missing}.so" ] && continue
            [ -e "${src_libdir}/lib${missing}.a" ] && continue
            candidate="$(find "${src_libdir}" -maxdepth 1 -type f \( -name "lib${missing}*.so*" -o -name "lib${missing}*.a" \) | head -n1)"
            [ -n "${candidate}" ] || continue
            ln -sfn "$(basename "${candidate}")" "${src_libdir}/lib${missing}.so"
            echo "Aliased ${src_libdir}/lib${missing}.so -> $(basename "${candidate}")"
          done

          # Only stage runtime .so files for packaging to keep Gradle memory low.
          dst_libdir="app/platform/android/app/libs/${abi}"
          mkdir -p "${dst_libdir}"
          find "${src_libdir}" -maxdepth 1 \( -name "*.so" -o -name "*.so.*" \) -exec cp -a {} "${dst_libdir}/" \;
        done
    - name: Build APK
      # build_libromfs_generator.sh must run before Gradle/CMake configure because
      # borealis's toolchain.cmake unconditionally checks that the generator binary
      # exists when PLATFORM_ANDROID is set — even though USE_LIBROMFS=OFF means
      # the generator is never actually used to embed anything.
      # Resources are loaded via APK assets (see build.gradle syncBorealisResources).
      run: |
        ${{ github.workspace }}/lib/borealis/build_libromfs_generator.sh
        cd app/platform/android && ./gradlew assembleRelease
    - name: Upload dist
      uses: actions/upload-artifact@v4
      with:
        name: VitaPlex-android-${{ github.run_number }}
        path: app/platform/android/app/build/outputs/apk/release/*.apk

  # ───────────────────────────────────────────────
  # Flatpak — Linux Matrix (x86_64 + aarch64, OpenGL)
  # ───────────────────────────────────────────────
  build-flatpak:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'flatpak' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Flatpak (${{ matrix.arch }}-${{ matrix.driver }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x86_64, runner: ubuntu-24.04, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gl, gles2: "OFF" }
        - { arch: aarch64, runner: ubuntu-24.04-arm, driver: gles2, gles2: "ON" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set workspace permissions
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Install dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            # librtmp1 / libssh-4 are Recommends (not Depends) of
            # libavformat on Ubuntu 24.04 — without them ldd of the
            # build's libavformat reports "librtmp.so.1 => not found"
            # and the bundling loop below silently skips it, then
            # Steam Deck (which doesn't ship librtmp.so.1) fails at
            # launch with "error while loading shared libraries:
            # librtmp.so.1". Pull them in explicitly so they're
            # present on the build host AND get bundled.
            sudo apt-get install -y --no-install-recommends \
              cmake ninja-build pkg-config \
              libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
              libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
              libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
              libpng-dev libwebp-dev libzstd-dev libdbus-1-dev \
              librtmp1 libssh-gcrypt-4 \
              libwayland-dev libxkbcommon-dev xorg-dev
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y \
              cmake ninja-build pkgconf-pkg-config \
              libcurl-devel mbedtls-devel mpv-devel \
              ffmpeg-devel lame-devel libass-devel freetype-devel harfbuzz-devel fribidi-devel \
              libpng-devel libwebp-devel libzstd-devel dbus-devel \
              wayland-devel libxkbcommon-devel libX11-devel libXrandr-devel libXi-devel libXinerama-devel libXcursor-devel
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache \
              cmake ninja pkgconf \
              curl-dev mbedtls-dev mpv-dev ffmpeg-dev lame-dev libass-dev freetype-dev harfbuzz-dev fribidi-dev \
              libpng-dev libwebp-dev zstd-dev dbus-dev wayland-dev libxkbcommon-dev libx11-dev libxrandr-dev libxi-dev libxinerama-dev libxcursor-dev
          else
            echo "No supported package manager found; assuming container image already has required build dependencies"
          fi
      - name: Build desktop target in flatpak container
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_GLES2=${{ matrix.gles2 }} \
             -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
             -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build

          # Make the tarball self-contained: bundle libmpv and any other
          # non-system shared deps next to the binary, set RPATH so the
          # loader finds them. Without this SteamOS / Bazzite / any
          # distro that doesn't ship libmpv.so.2 fails at launch with
          # "error while loading shared libraries: libmpv.so.2:
          # cannot open shared object file".
          #
          # Skip libs that ARE part of the base system on every modern
          # Linux: glibc, libstdc++, libgcc_s, OpenGL/EGL/Vulkan,
          # Wayland/X11/xkb/dbus, plus the dynamic loader itself. Those
          # belong to the distro and should NOT be shipped (an old
          # bundled glibc next to a newer host glibc is the classic way
          # to crash on startup).
          BUNDLE_DIR=build/lib
          mkdir -p "$BUNDLE_DIR"
          # `[-.]` after the prefix means we match both
          # libwayland-client.so.0 (hyphen) and libwayland.so.0 (dot)
          # without accidentally catching e.g. libcurl when we meant libc.
          # Dash must be first inside the bracket to be literal in POSIX ERE.
          EXCLUDE='^(/lib(64)?/ld-|.*/(libc|libm|libpthread|libdl|librt|libresolv|libutil|libnsl|libstdc\+\+|libgcc_s|libGL|libGLX|libEGL|libGLdispatch|libGLESv|libOpenGL|libvulkan|libX11|libxcb|libXext|libXrandr|libXi|libXinerama|libXcursor|libXrender|libXfixes|libwayland|libxkbcommon|libdbus|libsystemd|libudev|libdrm|libgbm)[-.]|linux-vdso\.so)'

          # Fixed-point walk: start from the binary, bundle every non-excluded
          # dep, then for each newly bundled lib walk ITS deps too. Previous
          # version did only one level of recursion past the binary, which
          # missed librtmp coming in via libavformat-via-libavformat-protocols
          # on some distros. Loop until no new libs land in $BUNDLE_DIR.
          # Fail loudly if ldd reports any dep as "not found" — the runtime
          # loader will hit the same gap on Steam Deck / Bazzite and refuse
          # to start the binary.
          declare -A bundled
          UNRESOLVED=""
          walk_deps() {
            local target="$1"
            while IFS= read -r raw; do
              # ldd "foo.so" lines look like:
              #   libfoo.so.1 => /path/to/libfoo.so.1 (0xaddr)
              #   libfoo.so.1 => not found
              # We need the path AND must detect the "not found" case
              # because awk '$3' silently turns it into "not".
              local needed path
              needed=$(echo "$raw" | awk '{print $1}')
              path=$(echo "$raw" | awk '{print $3}')
              if [ "$path" = "not" ]; then
                # `not found` — record it; verdict comes after the walk.
                UNRESOLVED+="${needed} (needed by $(basename "$target"))"$'\n'
                continue
              fi
              [[ -z "$path" || ! -f "$path" ]] && continue
              [[ "$path" =~ $EXCLUDE ]] && continue
              local name; name=$(basename "$path")
              if [ -z "${bundled[$name]+x}" ]; then
                cp -L "$path" "$BUNDLE_DIR/"
                bundled[$name]=1
                # Recurse into the just-bundled lib.
                walk_deps "$BUNDLE_DIR/$name"
              fi
            done < <(ldd "$target" 2>/dev/null | awk '/=>/')
          }
          walk_deps build/VitaPlex

          echo "Bundled libraries:"; ls -la "$BUNDLE_DIR" || true
          if [ -n "$UNRESOLVED" ]; then
            echo "::error::ldd reported unresolved dependencies on the build"
            echo "host — Steam Deck / Bazzite will hit the same gap. Either"
            echo "install the missing packages on the build runner or add"
            echo "their providers to the apt-get install list above."
            printf '%s' "$UNRESOLVED"
            exit 1
          fi

          # Point the binary at $ORIGIN/lib so it finds the bundled
          # copies before consulting the host's lib path. Falls back to
          # the system installation if a particular .so isn't bundled
          # (e.g. the OpenGL stack, which we deliberately skipped).
          if ! command -v patchelf >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get install -y patchelf || apt-get install -y patchelf
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y patchelf
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache patchelf
            fi
          fi
          # Patch the binary's RPATH to look in $ORIGIN/lib first.
          # Then patch every BUNDLED lib too — modern ELF uses DT_RUNPATH
          # which only resolves a library's DIRECT deps; the loader will
          # NOT cascade the binary's RUNPATH through libavformat when
          # libavformat asks for librtmp. So even though librtmp.so.1
          # is sitting in $ORIGIN/lib, the system-built libavformat (no
          # RUNPATH) couldn't see it and Steam Deck failed with
          # "error while loading shared libraries: librtmp.so.1".
          # Giving each bundled lib RPATH=$ORIGIN makes the bundle
          # self-resolving.
          patchelf --set-rpath '$ORIGIN/lib' build/VitaPlex
          for so in "$BUNDLE_DIR"/*.so*; do
            [ -f "$so" ] || continue
            # `|| true` because some libs (e.g. stripped vendor blobs)
            # may refuse to be patched; non-fatal for the overall bundle.
            patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          tar -czf VitaPlex-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz -C build VitaPlex resources lib
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-Flatpak-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}
          path: VitaPlex-Linux-${{ matrix.arch }}-${{ matrix.driver }}-${{ github.run_number }}.tar.gz

  # ───────────────────────────────────────────────
  # Nintendo Switch — Matrix (opengl + deko3d)
  # ───────────────────────────────────────────────
  build-nx:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'nx' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: NX (${{ matrix.driver }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        # switchfin's portlibs release currently pins libmpv at 0.36.0-5;
        # 0.41.0-5 was never published, so the previous URLs 404'd.
        - { driver: opengl, mpv_pkg: switch-libmpv-0.36.0-5-any.pkg.tar.zst, cmake_extra: "" }
        - { driver: deko3d, mpv_pkg: switch-libmpv-deko3d-0.36.0-5-any.pkg.tar.zst, cmake_extra: "-DUSE_DEKO3D=ON" }
    container:
      image: devkitpro/devkita64:20260219
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install switchfin portlibs
        run: |
          BASE_URL="https://github.com/dragonflylee/switchfin/releases/download/switch-portlibs"
          dkp-pacman --noconfirm -Rdd switch-libmpv || true
          dkp-pacman --noconfirm -Rdd switch-libmpv-deko3d || true
          dkp-pacman --noconfirm -U \
            $BASE_URL/hacBrewPack-3.05-1-x86_64.pkg.tar.zst \
            $BASE_URL/libuam-master-1-any.pkg.tar.zst \
            $BASE_URL/switch-dav1d-1.5.3-1-any.pkg.tar.zst \
            $BASE_URL/${{ matrix.mpv_pkg }}
      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DPLATFORM_SWITCH=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}" \
            ${{ matrix.cmake_extra }}
          cmake --build build
      - name: Upload NRO
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-switch-${{ matrix.driver }}-${{ github.run_number }}
          path: build/VitaPlex.nro

  # ───────────────────────────────────────────────
  # iOS / tvOS — full build against prebuilt MPVKit
  #
  # Just like the Vita / Switch jobs pull a prebuilt mpv tarball from
  # switchfin's portlibs, this job pulls MPVKit's prebuilt libmpv + ffmpeg
  # xcframeworks (https://github.com/mpvkit/MPVKit/releases) and links
  # against them. MPVKit statically bundles libass / freetype / harfbuzz /
  # MoltenVK / libplacebo inside Libmpv.xcframework, so the seven Libav*
  # frameworks plus Libmpv are everything we need.
  #
  # Builds for the SIMULATOR so no code-signing identity is required in CI
  # (device builds need a provisioning profile). The produced .app runs in
  # the iOS / tvOS Simulator; for a device install, build locally with
  # -DPLATFORM=OS64 / TVOS and sign in Xcode.
  # ───────────────────────────────────────────────
  build-ios:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'tvos' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Apple Mobile (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { target: ios,  cmake_flag: PLATFORM_IOS,  platform_for_toolchain: SIMULATORARM64, sdk: iphonesimulator }
        - { target: tvos, cmake_flag: PLATFORM_TVOS, platform_for_toolchain: SIMULATOR_TVOS, sdk: appletvsimulator }
    runs-on: macos-14
    env:
      # Pin to a release whose asset names match the loop below. All eight
      # frameworks MUST come from the same release so libmpv and its ffmpeg
      # are ABI-consistent.
      MPVKIT_VERSION: "0.41.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Cache static libcurl for ${{ matrix.sdk }}
        id: cache-libcurl
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libcurl-install
          key: libcurl-8.14.1-${{ matrix.sdk }}-v2
      - name: Build static libcurl for ${{ matrix.sdk }}
        # iOS Simulator SDK ships /usr/lib/libcurl.tbd but tvOS Simulator
        # SDK does NOT, so build a minimal static libcurl against the
        # matrix's SDK and link it directly — one code path for both.
        #
        # Pinned to 8.14.1: the LAST release with Secure Transport (Apple
        # TLS, zero extra deps) — curl 8.15.0 removed it, which would
        # force a cross-built OpenSSL dependency. Plex requires HTTPS
        # (plex.tv auth, *.plex.direct), so building --without-ssl is not
        # an option. 8.14.1 also long postdates the cf-socket.c
        # l_ip/l_port bug that broke 8.7.1.
        if: steps.cache-libcurl.outputs.cache-hit != 'true'
        run: |
          CURL_VERSION=8.14.1
          PREFIX="${{ github.workspace }}/libcurl-install"
          SDK_PATH=$(xcrun --sdk ${{ matrix.sdk }} --show-sdk-path)
          if [ "${{ matrix.target }}" = "ios" ]; then
            MIN_FLAG="-mios-simulator-version-min=13.0"
          else
            MIN_FLAG="-mappletvsimulator-version-min=13.0"
          fi
          mkdir -p "$PREFIX"
          cd /tmp
          curl -fL "https://curl.se/download/curl-${CURL_VERSION}.tar.gz" | tar xz
          cd "curl-${CURL_VERSION}"
          export CC="$(xcrun --sdk ${{ matrix.sdk }} --find clang)"
          export AR="$(xcrun --sdk ${{ matrix.sdk }} --find ar)"
          export RANLIB="$(xcrun --sdk ${{ matrix.sdk }} --find ranlib)"
          export CFLAGS="-arch arm64 -isysroot ${SDK_PATH} ${MIN_FLAG} -O2"
          # CPPFLAGS must carry the sysroot too: configure's function-
          # prototype probes run through `clang -E` with CPPFLAGS only
          # (not CFLAGS). macOS has no /usr/include without -isysroot,
          # so with empty CPPFLAGS every probe failed ("is prototyped...
          # no" for socket/fcntl/everything), HAVE_SOCKET never got
          # defined, and the build died at transfer.c "We cannot compile
          # without socket() support!".
          export CPPFLAGS="-arch arm64 -isysroot ${SDK_PATH} ${MIN_FLAG}"
          export LDFLAGS="-arch arm64 -isysroot ${SDK_PATH} ${MIN_FLAG}"
          ./configure \
            --host=aarch64-apple-darwin \
            --prefix="${PREFIX}" \
            --disable-shared --enable-static \
            --with-secure-transport \
            --without-libpsl --without-libidn2 --without-nghttp2 \
            --without-zstd --without-brotli --without-librtmp \
            --without-libssh --without-libssh2 --without-zlib \
            --disable-ldap --disable-ldaps --disable-rtsp \
            --disable-dict --disable-telnet --disable-tftp \
            --disable-pop3 --disable-imap --disable-smtp --disable-gopher \
            --disable-mqtt --disable-smb --disable-manual \
            --disable-debug
          make -j$(sysctl -n hw.ncpu)
          make install
          echo "Built libcurl.a: $(file ${PREFIX}/lib/libcurl.a)"
      - name: Export libcurl env
        run: |
          echo "LIBCURL_LIBRARY=${{ github.workspace }}/libcurl-install/lib/libcurl.a" >> $GITHUB_ENV
          echo "LIBCURL_INCLUDE=${{ github.workspace }}/libcurl-install/include" >> $GITHUB_ENV
      - name: Build libromfs-generator
        # borealis's iOS / tvOS toolchain requires this generator to be
        # built ahead of configure (it embeds resources/ via libromfs).
        run: ${{ github.workspace }}/lib/borealis/build_libromfs_generator.sh
      - name: Download MPVKit xcframeworks
        # libmpv-all.zip is the complete bundle: Libmpv + the seven Libav*
        # ffmpeg frameworks PLUS every optional-dependency xcframework that
        # this MPVKit build was compiled against (libass, freetype,
        # harfbuzz, fribidi, uchardet, dav1d, libplacebo, MoltenVK,
        # OpenSSL, …). Downloading the eight individual core zips is NOT
        # enough — the link then fails with undefined symbols from those
        # optional deps because MPVKit does not statically fold them into
        # Libmpv. Non-GPL variant: LGPL ffmpeg still decodes H.264 / HEVC
        # / VP9 / AV1 / AAC / AC3 — everything Plex direct-plays.
        run: |
          FW_DIR="${{ github.workspace }}/mpv-frameworks"
          mkdir -p "$FW_DIR"
          BASE="https://github.com/mpvkit/MPVKit/releases/download/${MPVKIT_VERSION}"
          curl -fL --retry 4 --retry-delay 2 \
            -o /tmp/libmpv-all.zip "${BASE}/libmpv-all.zip"
          unzip -q /tmp/libmpv-all.zip -d /tmp/libmpv-all
          # Flatten: the zip may nest the xcframeworks inside a directory;
          # CMake globs only ${FW_DIR}/*.xcframework at the top level.
          find /tmp/libmpv-all -name "*.xcframework" -type d -maxdepth 4 \
            -exec mv {} "$FW_DIR/" \;
          echo "Frameworks staged:"; ls -la "$FW_DIR"
          test -d "$FW_DIR/Libmpv.xcframework"
      - name: Configure
        run: |
          cmake -G Xcode -B build \
            -D${{ matrix.cmake_flag }}=ON \
            -DPLATFORM=${{ matrix.platform_for_toolchain }} \
            -DDEPLOYMENT_TARGET=13.0 \
            -DBOREALIS_LIBRARY=${{ github.workspace }}/lib/borealis/library \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}" \
            -DLIBROMFS_PREBUILT_GENERATOR=${{ github.workspace }}/lib/borealis/libromfs-generator \
            -DAPPLE_MPV_XCFRAMEWORKS_DIR=${{ github.workspace }}/mpv-frameworks \
            -DLIBCURL_INCLUDE_DIR=${{ env.LIBCURL_INCLUDE }} \
            -DLIBCURL_LIBRARY=${{ env.LIBCURL_LIBRARY }}
      - name: Build
        run: |
          cmake --build build --config Release -- \
            -sdk ${{ matrix.sdk }} \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Locate and stage .app
        run: |
          APP="$(find build -name 'VitaPlex.app' -type d | head -1)"
          if [ -z "$APP" ]; then echo "VitaPlex.app not produced"; exit 1; fi
          echo "Built: $APP"
          mkdir -p stage && cp -R "$APP" stage/
      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-${{ matrix.target }}-${{ github.run_number }}
          path: stage/VitaPlex.app

  # ───────────────────────────────────────────────
  # PS4
  # ───────────────────────────────────────────────
  build-ps4:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'ps4' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: PS4
    runs-on: ubuntu-latest
    container:
      image: xfangfang/pacbrew:250221
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install PS4 portlibs
        env:
          BASE_URL: https://github.com/dragonflylee/switchfin/releases/download/pacbrew
        run: |
          for pkg in musl-1.5-3 mbedtls-2.28.10-2 sdl2-2.0.18-19 libcurl-7.80.0-5; do
            pacman --noconfirm -U "$BASE_URL/ps4-openorbis-${pkg}-any.pkg.tar.gz"
          done
      - name: Build
        env:
          OPENORBIS: /opt/pacbrew/ps4/openorbis
        run: |
          cmake -B build -DPLATFORM_PS4=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build
      - name: Upload PS4 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-ps4-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/**/*.pkg
            build/**/*.oelf

  # ───────────────────────────────────────────────
  # macOS matrix (explicit job name parity)
  # ───────────────────────────────────────────────
  build-macos:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'macos' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: macOS (${{ matrix.tag }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { tag: Silicon, arch: arm64, target: "11.0", runner: macos-14 }
        - { tag: Intel, arch: x86_64, target: "11.0", runner: macos-15-intel }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: brew install cmake ninja pkg-config curl mbedtls mpv libass freetype harfbuzz fribidi libpng webp zstd glfw
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.target }} \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build
      - name: Bundle macOS dylibs
        run: |
          BIN="build/VitaPlex"
          if [ ! -f "$BIN" ]; then
            echo "Expected binary not found: $BIN"
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          queue_file="$tmpdir/queue.txt"
          scanned_file="$tmpdir/scanned.txt"
          bundled_file="$tmpdir/bundled.txt"
          printf '%s\n' "$BIN" > "$queue_file"
          : > "$scanned_file"
          : > "$bundled_file"

          while [ -s "$queue_file" ]; do
            current="$(head -n 1 "$queue_file")"
            tail -n +2 "$queue_file" > "$queue_file.next" || true
            mv "$queue_file.next" "$queue_file"
            printf '%s\n' "$current" >> "$scanned_file"

            while IFS= read -r dep; do
              resolved_dep="$dep"
              case "$dep" in
                /usr/lib/*|/System/*|@executable_path/*|@loader_path/*)
                  continue
                  ;;
                @rpath/*)
                  base_from_rpath="${dep#@rpath/}"
                  resolved_dep=""
                  for probe in \
                    "/usr/local/lib/$base_from_rpath" \
                    "/opt/homebrew/lib/$base_from_rpath" \
                    /usr/local/opt/*/lib/"$base_from_rpath" \
                    /opt/homebrew/opt/*/lib/"$base_from_rpath"; do
                    if [ -f "$probe" ]; then
                      resolved_dep="$probe"
                      break
                    fi
                  done
                  if [ -z "$resolved_dep" ]; then
                    echo "Skipping unresolved @rpath dependency: $dep"
                    continue
                  fi
                  ;;
              esac

              if [ ! -f "$resolved_dep" ]; then
                echo "Skipping missing dependency reference: $dep"
                continue
              fi

              base="$(basename "$resolved_dep")"
              target="build/$base"

              if ! grep -Fxq "$base" "$bundled_file"; then
                cp -f "$resolved_dep" "$target"
                install_name_tool -id "@executable_path/$base" "$target"
                install_name_tool -add_rpath "@executable_path" "$target" 2>/dev/null || true
                printf '%s\n' "$base" >> "$bundled_file"
                echo "Bundled $base (from $(basename "$current"))"
              fi

              install_name_tool -change "$dep" "@executable_path/$base" "$current"

              if ! grep -Fxq "$target" "$scanned_file" && ! grep -Fxq "$target" "$queue_file"; then
                printf '%s\n' "$target" >> "$queue_file"
              fi
            done < <(otool -L "$current" | tail -n +2 | awk '{print $1}')
          done

          install_name_tool -add_rpath "@executable_path" "$BIN" 2>/dev/null || true

          rm -rf "$tmpdir"
      - name: Package macOS DMG
        run: |
          APP_ROOT="build/dmg-root"
          APP_DIR="$APP_ROOT/VitaPlex.app"
          MACOS_DIR="$APP_DIR/Contents/MacOS"

          rm -rf "$APP_ROOT"
          mkdir -p "$MACOS_DIR"

          cp -f build/VitaPlex "$MACOS_DIR/VitaPlex"
          cp -R build/resources "$MACOS_DIR/resources"
          cp -f build/*.dylib "$MACOS_DIR/" 2>/dev/null || true
          chmod +x "$MACOS_DIR/VitaPlex"

          cat > "$APP_DIR/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>VitaPlex</string>
            <key>CFBundleDisplayName</key><string>VitaPlex</string>
            <key>CFBundleIdentifier</key><string>com.VitaPlex.app</string>
            <key>CFBundleVersion</key><string>${{ needs.resolve-version.outputs.version_number }}</string>
            <key>CFBundleShortVersionString</key><string>${{ needs.resolve-version.outputs.version }}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleExecutable</key><string>VitaPlex</string>
          </dict>
          </plist>
          PLIST

          hdiutil create \
            -volname "VitaPlex" \
            -srcfolder "$APP_ROOT" \
            -ov \
            -format UDZO \
            "build/VitaPlex-${{ matrix.tag }}.dmg"
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-macos-${{ matrix.tag }}-${{ github.run_number }}
          path: |
            build/VitaPlex
            build/VitaPlex-*.dmg
            build/*.dylib
            build/resources/

  # ───────────────────────────────────────────────
  # MinGW matrix (x64/x86/arm64)
  # ───────────────────────────────────────────────
  build-mingw:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'mingw64' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: MinGW (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
        - { arch: x64, sys: mingw64, env: x86_64, runner: windows-latest }
        - { arch: x86, sys: mingw32, env: i686, runner: windows-latest }
        - { arch: arm64, sys: clangarm64, env: clang-aarch64, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          path-type: inherit
          cache: false
          release: ${{ contains(matrix.sys, 'arm64') }}
          install: >-
            mingw-w64-${{ matrix.env }}-ninja
            mingw-w64-${{ matrix.env }}-cc
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-glfw
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependency
        run: |
          for pkg in glfw-3.5.0-1 curl-8.16.0-1 mpv-0.41.0-1 libwebp-1.6.0-1; do
            curl -sLO https://github.com/dragonflylee/switchfin/releases/download/mingw-packages/${MINGW_PACKAGE_PREFIX}-${pkg}-any.pkg.tar.zst
          done
          pacman -U --noconfirm *.pkg.tar.zst
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON -DUSE_SYSTEM_GLFW=ON -DUSE_D3D11=ON \
          -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
          -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build
      - name: Bundle runtime DLLs
        run: |
          EXE="build/VitaPlex.exe"
          DLL_DIR="${MINGW_PREFIX}/bin"
          if [ ! -f "$EXE" ]; then
            echo "Expected binary not found: $EXE"
            exit 1
          fi
          if [ ! -d "$DLL_DIR" ]; then
            echo "Expected DLL directory not found: $DLL_DIR"
            exit 1
          fi

          queue=("$EXE")
          declare -A scanned
          declare -A bundled
          while [ ${#queue[@]} -gt 0 ]; do
            current="${queue[0]}"
            queue=("${queue[@]:1}")
            scanned["$current"]=1

            mapfile -t dlls < <(objdump -p "$current" | awk '/DLL Name:/{print $3}' | sort -u)
            for dll in "${dlls[@]}"; do
              candidate="$DLL_DIR/$dll"
              target="build/$dll"
              if [ -f "$candidate" ]; then
                if [ -z "${bundled[$dll]+x}" ]; then
                  cp -f "$candidate" "$target"
                  bundled["$dll"]=1
                  echo "Bundled $dll (from $(basename "$current"))"
                fi
                if [ -z "${scanned[$target]+x}" ]; then
                  queue+=("$target")
                fi
              fi
            done
          done

          echo "DLLs bundled into build/:"
          ls -1 build/*.dll
      - name: Upload mingw artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-mingw-${{ matrix.arch }}-${{ github.run_number }}
          path: |
            build/VitaPlex.exe
            build/*.dll
            build/resources/

  # ───────────────────────────────────────────────
  # Debian package-like build
  # ───────────────────────────────────────────────
  build-deb:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'deb' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: Deb build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build
          PKGROOT="pkgroot"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/DEBIAN" "$PKGROOT/usr/bin" "$PKGROOT/usr/lib/VitaPlex" "$PKGROOT/usr/share/VitaPlex" "$PKGROOT/usr/share/applications" "$PKGROOT/usr/share/pixmaps"
          install -m 755 build/VitaPlex "$PKGROOT/usr/lib/VitaPlex/VitaPlex"
          {
            echo '#!/usr/bin/env sh'
            echo 'cd /usr/share/VitaPlex || exit 1'
            echo 'exec /usr/lib/VitaPlex/VitaPlex "$@"'
          } > "$PKGROOT/usr/bin/VitaPlex"
          chmod 755 "$PKGROOT/usr/bin/VitaPlex"
          cp -r build/resources "$PKGROOT/usr/share/VitaPlex/resources"
          install -m 644 app/platform/icon_desktop.png "$PKGROOT/usr/share/pixmaps/VitaPlex.png"
          {
            echo '[Desktop Entry]'
            echo 'Type=Application'
            echo 'Name=VitaPlex'
            echo 'Comment=Plex desktop client'
            echo 'Exec=VitaPlex'
            echo 'Icon=VitaPlex'
            echo 'Terminal=false'
            echo 'Categories=Network;Utility;'
          } > "$PKGROOT/usr/share/applications/VitaPlex.desktop"
          ARCH="$(dpkg --print-architecture)"
          {
            echo "Package: VitaPlex"
            echo "Version: ${{ needs.resolve-version.outputs.version_number }}"
            echo "Section: utils"
            echo "Priority: optional"
            echo "Architecture: ${ARCH}"
            echo "Maintainer: VitaPlex CI <ci@VitaPlex.local>"
            echo "Description: VitaPlex desktop build artifact"
          } > "$PKGROOT/DEBIAN/control"
          dpkg-deb --build "$PKGROOT" "VitaPlex-${{ github.run_number }}_${ARCH}.deb"
      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-deb-${{ github.run_number }}
          path: VitaPlex-${{ github.run_number }}_*.deb

  # ───────────────────────────────────────────────
  # AUR-like build
  # ───────────────────────────────────────────────
  build-aur:
    needs: [resolve-version]
    if: ${{ inputs.platform == 'aur' || inputs.platform == 'all' || github.event_name != 'workflow_dispatch' }}
    name: AUR build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential git pkg-config zstd \
            libcurl4-openssl-dev libmbedtls-dev libmpv-dev \
            libavcodec-dev libavformat-dev libavfilter-dev libswresample-dev libswscale-dev libavutil-dev \
            libmp3lame-dev libass-dev libfreetype-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libwebp-dev libdbus-1-dev \
            wayland-protocols libwayland-bin libwayland-dev libxkbcommon-dev xorg-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DPLATFORM_DESKTOP=ON \
            -DAPP_VERSION=${{ needs.resolve-version.outputs.version_number }} \
            -DAPP_DISPLAY_VERSION="${{ needs.resolve-version.outputs.version }}"
          cmake --build build
          tar --zstd -cf VitaPlex-${{ github.run_number }}.pkg.tar.zst -C build VitaPlex resources
      - name: Upload aur artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaPlex-aur-${{ github.run_number }}
          path: VitaPlex-${{ github.run_number }}.pkg.tar.zst
